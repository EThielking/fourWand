<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>iWand — Behavioral Pilot</title>
<style>
  :root{
    --bg:#16181c; --bg-soft:#1d2025; --panel:#23272e;
    --ink:#e9ecf1; --ink-dim:#a4abb6; --line:#333842;
    --accent:#6ea8fe; --accent-ink:#0c1422;
    --good:#7bd88f; --warn:#f0c674; --bad:#e8806f;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{ background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:17px; line-height:1.6; -webkit-font-smoothing:antialiased; overflow:hidden; }
  #app{height:100%;width:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{ width:100%; max-width:680px; background:var(--bg-soft); border:1px solid var(--line);
    border-radius:14px; padding:34px 38px; box-shadow:0 18px 50px rgba(0,0,0,.35);
    max-height:calc(100vh - 48px); overflow:auto; }
  h1{font-size:25px;line-height:1.25;margin:0 0 6px;letter-spacing:-.01em}
  h2{font-size:20px;margin:26px 0 8px;letter-spacing:-.01em}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 14px}
  p{margin:0 0 14px;color:var(--ink)}
  .dim{color:var(--ink-dim)} .small{font-size:14.5px}
  ul{margin:0 0 14px;padding-left:20px} li{margin:6px 0}
  .key{display:inline-block;min-width:1.9em;text-align:center;font-family:var(--mono);font-size:13px;
    padding:2px 8px;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;background:#11141a;color:var(--ink)}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
  button.btn{ font:inherit;font-size:16px;cursor:pointer;border-radius:10px;padding:12px 20px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);transition:transform .04s ease,border-color .15s ease,background .15s ease; }
  button.btn:hover{border-color:var(--accent)}
  button.btn:active{transform:translateY(1px)}
  button.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  button.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  button.primary:hover{filter:brightness(1.06)}
  button.ghost{background:transparent}
  input[type=text]{ font:inherit;font-size:16px;width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
    background:#11141a;color:var(--ink);margin:4px 0 2px; }
  input[type=text]:focus-visible{outline:3px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  label.field{display:block;font-size:14px;color:var(--ink-dim);margin-top:10px}
  .note{font-size:13.5px;color:var(--ink-dim);border-left:2px solid var(--line);padding:2px 0 2px 14px;margin:14px 0}
  .scale{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 6px}
  .scale button{flex:1 1 auto;min-width:54px}
  .progress{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--ink-dim);text-transform:uppercase}
  hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  .ok{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  .choice{display:flex;flex-direction:column;gap:12px;margin:18px 0}
  .choice button{text-align:left;padding:16px 20px}
  .choice .big{font-size:17px;font-weight:600} .choice .sub{font-size:13.5px;color:var(--ink-dim);margin-top:2px}
  #stage{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:50}
  #stage.show{display:flex}
  #stage.dark{background:#000}
  #stage.open{background:#191b1f}
  .fix{font-size:64px;font-weight:300;color:#cfd4dc;user-select:none}
  .stagebig{font-size:120px;font-weight:200;color:#e9ecf1}
  .stagetext{max-width:560px;padding:0 24px;font-size:21px;color:#e9ecf1}
  .stagehint{margin-top:22px;font-family:var(--mono);font-size:13px;letter-spacing:.1em;color:#8a929e;text-transform:uppercase}
  .countbeat{font-family:var(--mono);font-size:14px;color:#8a929e;margin-top:18px}
  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;background:rgba(8,9,11,.86)}
  #overlay.show{display:flex}
  #overlay .ocard{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:28px 32px;max-width:420px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  #overlay h2{margin:0 0 8px}
  .sumrow{padding:14px 0;border-top:1px solid var(--line)}
  .sumrow:first-of-type{border-top:none}
  .sumhead{font-weight:600;font-size:16px;margin-bottom:8px;letter-spacing:-.01em}
  .sumhead .tag{font-family:var(--mono);font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em;margin-left:8px}
  .mwbar{height:7px;border-radius:99px;background:#11141a;border:1px solid var(--line);overflow:hidden;margin:4px 0 10px}
  .mwbar span{display:block;height:100%;background:var(--accent)}
  .sumline{font-size:14.5px;margin:3px 0}
  .sumline.dim{color:var(--ink-dim)}
  @media (max-width:520px){ .card{padding:26px 22px} h1{font-size:22px} body{font-size:16px} }
  @media (prefers-reduced-motion: reduce){ button.btn{transition:none} }
  /* ===== mobile touch controls ===== */
  body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
  button{touch-action:manipulation}
  #touch{position:fixed;left:0;right:0;bottom:0;display:none;z-index:60}
  #touch.show{display:flex}
  #touch.central{justify-content:center;align-items:flex-end;padding:0 16px calc(16px + env(safe-area-inset-bottom)) 16px}
  #touch.central #respBtn{width:100%;max-width:620px;min-height:22vh;border:none;border-radius:22px;
    background:linear-gradient(180deg,#2b3550,#222a3f);color:#eaf0ff;font:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.42);user-select:none;touch-action:manipulation}
  #touch.central #respBtn:active{filter:brightness(1.18)}
  #respBtn .tlabel{font-size:19px;font-weight:600}
  #respBtn .tsub{font-size:13px;color:#aeb9d6}
  #touch.probe{top:0;flex-direction:column}
  #touch.probe .qhdr{flex:0 0 auto;padding:10px 16px calc(8px + env(safe-area-inset-top)) 16px;text-align:center;font-size:14px;color:#cfd6e6;background:#15171b}
  #touch.probe .band{flex:1 1 0;border:none;border-bottom:1px solid rgba(255,255,255,.08);color:#eaf0ff;font:inherit;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:19px;font-weight:600;
    cursor:pointer;user-select:none;touch-action:manipulation}
  #touch.probe .band small{font-size:13px;font-weight:400;color:#b9c2da}
  #touch.probe .band-off{background:#3a2f4a}
  #touch.probe .band-other{background:#34304a}
  #touch.probe .band-on{background:#243a33;border-bottom:none}
  #touch.probe .band:active{filter:brightness(1.28)}
  #pauseBtn{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;display:none;z-index:70;
    width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:rgba(20,22,28,.72);
    color:var(--ink-dim);font-size:16px;cursor:pointer;touch-action:manipulation}
  #pauseBtn.show{display:block}
</style>
</head>
<body>
<div id="app"></div>
<div id="stage" aria-live="polite"></div>
<div id="overlay" aria-live="assertive"></div>
<div id="touch"></div>
<button id="pauseBtn" aria-label="Pause">⏸</button>
<script>
"use strict";
/* iWand — web behavioral collection (v2). Self-contained, no external libraries. */
const CONFIG = {
  DATA_ENDPOINT: "https://script.google.com/macros/s/AKfycbwiSvQQXZoHAieW-xkBY6nXkSgQT_kpM3j9V1UiTEIauoivQvfEbNTOzOLMImzApNIg/exec",
  CONTACT_EMAIL: "esther.thielking@gmail.com",
  STUDY_NAME:    "fourWand",
  APP_VERSION:   "web-2.0-mobile",
  CONDITIONS_TO_RUN: ["iEO", "iEC", "eEO", "eEC"],
  RANDOMIZE_ORDER:   true,
  blockMinutes:     7.33,
  OFFER_DURATION_CHOICE: true,
  BLOCK_MINUTES_IDEAL:   7.33,
  BLOCK_MINUTES_SHORT:   5,
  oddballRateHz:    1.4,
  standardHz:       500,
  deviantHz:        650,
  stimDurationSecs: 0.100,
  PROBE_GAP_MIN:    20,
  PROBE_GAP_MAX:    30,
  oddballChunkSize:          10,
  nDeviantPerChunk:          2,
  minStandardsBetweenDeviants: 2,
  USE_SPOKEN_PROBE: true,
  ALLOW_PAUSE_QUIT:  true,
  SPEAK_EYES_CLOSED: false,
  REQUIRE_FULLSCREEN: false, // fullscreen is unreliable on mobile browsers
  SHORT_PRACTICE:     true,
  PRACTICE_TONE_SECS: 26,
  toneGain: 0.18,
};
const SOA            = 1 / CONFIG.oddballRateHz;
const ISI            = SOA - CONFIG.stimDurationSecs;
const RESP_WIN       = SOA;
const STANDARD = 1, DEVIANT = 2;
const MIN_DEV_GAP    = CONFIG.minStandardsBetweenDeviants + 1;
let   GAP_MIN_STIM   = Math.ceil(CONFIG.PROBE_GAP_MIN / SOA);
let   GAP_MAX_STIM   = Math.floor(CONFIG.PROBE_GAP_MAX / SOA);
if (GAP_MAX_STIM < GAP_MIN_STIM) GAP_MAX_STIM = GAP_MIN_STIM;
const RUN = { blockMinutes:null, blockSecs:null, nReq:null, nChunks:null, nTones:null };
function setBlockDuration(min){
  RUN.blockMinutes = min;
  RUN.blockSecs    = min * 60;
  RUN.nReq         = Math.ceil(RUN.blockSecs / SOA);
  RUN.nChunks      = Math.ceil(RUN.nReq / CONFIG.oddballChunkSize);
  RUN.nTones       = RUN.nChunks * CONFIG.oddballChunkSize;
}
setBlockDuration(CONFIG.blockMinutes);
const COND_DEFS = {
  iEO:{label:"iEO",eye:"EO",eyeName:"eyes open",  eyeCode:1,task:"breath",taskName:"breath",taskCode:0},
  iEC:{label:"iEC",eye:"EC",eyeName:"eyes closed",eyeCode:0,task:"breath",taskName:"breath",taskCode:0},
  eEO:{label:"eEO",eye:"EO",eyeName:"eyes open",  eyeCode:1,task:"sound", taskName:"sound", taskCode:1},
  eEC:{label:"eEC",eye:"EC",eyeName:"eyes closed",eyeCode:0,task:"sound", taskName:"sound", taskCode:1},
};
const URLP = new URLSearchParams(location.search);
const FORCE_COND = URLP.get("cond");
const PREFILL_PID = URLP.get("pid") || "";
const SESSION = {
  participant_id: PREFILL_PID, session_id: makeSessionId(),
  startISO: null, endISO: null, order: [], rows: [], meta: {},
  endedEarly: false, chosenBlockMinutes: CONFIG.blockMinutes,
};
window.__IWAND = SESSION;
const STATE = {
  screen: "welcome",
  runState: "idle",
  prePauseRun: null, pauseKind: null,
  task: null, eye: null,
};
/* ===================== AUDIO ENGINE ================================= */
let actx = null, outLatSec = 0;
function initAudio(){
  if (actx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  actx = new AC({ latencyHint: "interactive" });
  outLatSec = (typeof actx.outputLatency === "number" && actx.outputLatency > 0)
              ? actx.outputLatency : (actx.baseLatency || 0);
}
function resumeAudio(){ if (actx && actx.state === "suspended") actx.resume(); }
function audioToPerf(at){ return (at - actx.currentTime) * 1000 + performance.now() + outLatSec * 1000; }
function scheduleTone(freq, durSec, when, gain){
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.type = "sine"; osc.frequency.value = freq;
  const a = 0.005, r = 0.006;
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(gain, when + a);
  g.gain.setValueAtTime(gain, when + Math.max(durSec - r, a));
  g.gain.exponentialRampToValueAtTime(0.0001, when + durSec);
  osc.connect(g).connect(actx.destination);
  osc.start(when); osc.stop(when + durSec + 0.02);
}
function scheduleSoft(freq, durSec, when, gain){
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.type = "sine"; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(gain, when + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when + durSec);
  osc.connect(g).connect(actx.destination);
  osc.start(when); osc.stop(when + durSec + 0.02);
}
function scheduleBell(when){
  [[660,0.0],[990,0.06],[1320,0.12]].forEach(([f,off])=>{
    const osc = actx.createOscillator(), g = actx.createGain();
    osc.type="sine"; osc.frequency.value=f; const t=when+off;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.14,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.9);
    osc.connect(g).connect(actx.destination); osc.start(t); osc.stop(t+1.0);
  });
}
function scheduleBeep(when, high){ scheduleSoft(high?880:560, 0.12, when, 0.12); }
function scheduleNoiseCue(when){
  const dur = 0.34, sr = actx.sampleRate;
  const buf = actx.createBuffer(1, Math.max(1, Math.ceil(sr*dur)), sr);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1100; bp.Q.value=0.8;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(0.13, when+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when+dur);
  src.connect(bp).connect(g).connect(actx.destination);
  src.start(when); src.stop(when+dur+0.02);
}
let ttsAvailable = false;
function initTTS(){
  try{
    if (!("speechSynthesis" in window)){ ttsAvailable = false; return; }
    window.speechSynthesis.getVoices();
    ttsAvailable = true;
    window.speechSynthesis.onvoiceschanged = ()=>{ ttsAvailable = true; };
  }catch(e){ ttsAvailable = false; }
}
function speakNow(text){
  try{
    if (!("speechSynthesis" in window)) return false;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0; u.lang = "en-US";
    window.speechSynthesis.speak(u);
    return true;
  }catch(e){ return false; }
}
function speakGuidance(text){ if (CONFIG.SPEAK_EYES_CLOSED) speakNow(text); }
function probeCue(when){
  if (CONFIG.USE_SPOKEN_PROBE && ttsAvailable && ("speechSynthesis" in window)){
    if (speakNow("pause")) return performance.now();
  }
  scheduleNoiseCue(when);
  return audioToPerf(when);
}
/* ===================== SEQUENCE GENERATOR ========================== */
function buildBlockSequence(){
  const C = CONFIG.oddballChunkSize;
  let seq = [], lastDevGlobal = -999;
  for (let ichunk = 1; ichunk <= RUN.nChunks; ichunk++){
    const pairs = [];
    for (let p1 = 1; p1 <= C; p1++){
      for (let p2 = p1 + MIN_DEV_GAP; p2 <= C; p2++){
        const g1 = (ichunk - 1) * C + p1;
        if ((g1 - lastDevGlobal) >= MIN_DEV_GAP) pairs.push([p1, p2]);
      }
    }
    if (!pairs.length) throw new Error("Cannot build oddball chunk with spacing rule.");
    const [p1, p2] = pairs[(Math.random() * pairs.length) | 0];
    const chunk = new Array(C).fill(STANDARD);
    chunk[p1 - 1] = DEVIANT; chunk[p2 - 1] = DEVIANT;
    seq = seq.concat(chunk);
    lastDevGlobal = (ichunk - 1) * C + p2;
  }
  return seq.slice(0, RUN.nTones);
}
function randGapStim(){ return GAP_MIN_STIM + ((Math.random() * (GAP_MAX_STIM - GAP_MIN_STIM + 1)) | 0); }
function buildPracticeSeq(n){
  const seq = new Array(n).fill(STANDARD);
  let i = 3 + ((Math.random()*2)|0);
  while (i < n-2){ seq[i] = DEVIANT; i += MIN_DEV_GAP + 1 + ((Math.random()*3)|0); }
  if (n>=2){ seq[n-1]=STANDARD; seq[n-2]=STANDARD; }
  return seq;
}
/* ===================== UI HELPERS ================================== */
const app = document.getElementById("app");
const stage = document.getElementById("stage");
const overlay = document.getElementById("overlay");
function show(html){ app.innerHTML = `<div class="card">${html}</div>`; app.scrollTop = 0; }
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setStage(mode, inner){
  stage.className = "";
  if (mode === "hide"){ stage.classList.remove("show"); stage.innerHTML = ""; return; }
  stage.classList.add("show", mode); stage.innerHTML = inner || "";
}
function showOverlay(html){ overlay.innerHTML = `<div class="ocard">${html}</div>`; overlay.classList.add("show"); }
function hideOverlay(){ overlay.classList.remove("show"); overlay.innerHTML = ""; }

/* ===================== MOBILE: device, wake lock, touch =========== */
function deviceType(){
  try{
    const ua = navigator.userAgent || "";
    const coarse = (window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
    const touchPts = (navigator.maxTouchPoints || 0) > 1;
    const mobUA = /Android|iPhone|iPad|iPod|Mobile|Silk|Kindle|BlackBerry|Opera Mini|IEMobile/i.test(ua);
    const iPadOS = /Macintosh/.test(ua) && touchPts;
    return (mobUA || iPadOS || (coarse && touchPts)) ? "mobile" : "desktop";
  }catch(e){ return "desktop"; }
}
let wakeLock = null;
async function acquireWake(){ try{ if ("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); } }catch(e){} }
function releaseWake(){ try{ if (wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){} }
const touch = document.getElementById("touch");
const pauseBtn = document.getElementById("pauseBtn");
function hideTouch(){ touch.className = ""; touch.innerHTML = ""; }
function centralLabel(isSound){ return isSound ? "" : ""; }
function centralSub(isSound){ return isSound ? "" : ""; }
function renderCentral(onPress, label, sub){
  touch.className = "show central";
  touch.innerHTML = '<button class="tapbtn" id="respBtn"><span class="tlabel">'+label+'</span>'+(sub?'<span class="tsub">'+sub+'</span>':'')+'</button>';
  const b = document.getElementById("respBtn");
  b.addEventListener("pointerdown", function(e){ e.preventDefault(); resumeAudio(); onPress(); }, {passive:false});
}
function renderProbeBands(onPress){
  touch.className = "show probe";
  touch.innerHTML =
    '<div class="qhdr">Where was your attention, just before? &mdash; tap one</div>'+
    '<button class="band band-off" data-code="1">Off task<small>mind wandered to something unrelated</small></button>'+
    '<button class="band band-other" data-code="2">Off task<small>caught up in the other activity</small></button>'+
    '<button class="band band-on" data-code="0">On task<small>focused on the task</small></button>';
  const map = { "0":["DownArrow","On"], "1":["UpArrow","Off-nonstim"], "2":["LeftArrow","Off-stim"] };
  const bands = touch.querySelectorAll(".band");
  for (let i=0;i<bands.length;i++){
    bands[i].addEventListener("pointerdown", function(e){
      e.preventDefault(); resumeAudio();
      const c = this.getAttribute("data-code"); const m = map[c];
      onPress(+c, m[0], m[1]);
    }, {passive:false});
  }
}
function showPauseBtn(){ pauseBtn.className = "show"; }
function hidePauseBtn(){ pauseBtn.className = ""; }
pauseBtn.addEventListener("pointerdown", function(e){ e.preventDefault(); if (STATE.screen==="block" && STATE.runState!=="paused") pauseBlock("menu"); });
function renderMenuOverlay(){
  showOverlay(`
    <h2>Paused</h2>
    <p class="small dim">Your place is held. Resume when you're ready, or stop here &mdash; either way your data so far is saved.</p>
    <div class="row" style="justify-content:center;margin-top:6px">
      <button class="btn primary" id="ovResume3">Resume</button>
      <button class="btn" id="ovQuit3">Save &amp; quit</button>
    </div>
  `);
  el("ovResume3").onclick = resumeBlock;
  el("ovQuit3").onclick = quitNow;
}

/* ===================== SCREEN FLOW ================================= */
function start(){
  if (FORCE_COND && COND_DEFS[FORCE_COND]) SESSION.order = [FORCE_COND];
  else {
    let labels = CONFIG.CONDITIONS_TO_RUN.filter(l => COND_DEFS[l]);
    if (CONFIG.RANDOMIZE_ORDER) labels = shuffle(labels.slice());
    SESSION.order = labels;
  }
  screenWelcome();
}
function screenWelcome(){
  STATE.screen = "welcome";
  show(`
    <p class="eyebrow">${esc(CONFIG.STUDY_NAME)}</p>
    <h1>Thanks for helping us study natural fluctuations in attention!</h1>
    <p class="dim small">It takes roughly <strong>${esc(estRangeText())}</strong> in total, split into four shorter blocks (you'll pick the length on the next screen). You can take breaks after each block. It runs entirely in this tab, and your responses are sent to the researcher automatically at the end.</p>
    <h2>Before you start</h2>
    <ul class="small">
      <li><strong>Use headphones</strong> if you can, in a quiet room where you won't be interrupted.</li>
      <li>Hold your <strong>phone</strong> comfortably &mdash; you'll respond with large on-screen buttons.</li>
      <li><strong>Turn off silent mode</strong> and turn your volume up, so you can hear the beeps clearly.</li>
      <li>Keep the screen on; the study tries to stop it sleeping, but please don't lock it mid-block.</li>
      <li>Silence notifications and close other tabs.</li>
    </ul>
    <label class="field" for="pid">Your name or initials (so the researcher knows whose data this is)</label>
    <input id="pid" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. Alex R" value="${esc(SESSION.participant_id)}" />
    <div id="pidErr" class="small bad" style="min-height:18px"></div>
    <hr/>
    <h2 class="small" style="margin-top:0">Quick sound check</h2>

function mean(a){ return a.reduce((s,x)=>s+x,0)/a.length; }
function pstd(a,m){ if (a.length<2) return NaN; const mm=(m==null?mean(a):m); return Math.sqrt(a.reduce((s,x)=>s+(x-mm)*(x-mm),0)/a.length); }

function halfTrend(events){
  if (events.length < 6) return null;
  const s = events.slice().sort((a,b)=>a.t-b.t);
  const mid = Math.floor(s.length/2);
  const early = mean(s.slice(0,mid).map(e=>e.v));
  const late  = mean(s.slice(mid).map(e=>e.v));
  const rel = (late - early)/(Math.abs(early)||1);
  let dir = "steady"; if (rel > 0.10) dir="up"; else if (rel < -0.10) dir="down";
  return { early, late, dir, rel };
}
function computeSummary(){
  const rows = SESSION.rows, conds = [];
  SESSION.order.forEach((cond)=>{
    const def = COND_DEFS[cond], isSound = def.task==="sound";
    const probes = rows.filter(r=> r.row_type==="probe" && r.condition===cond && r.mind_wandering!=="" && r.mind_wandering!=null)
                       .map(r=>({ t:+r.probeOn_block, mw:+r.mind_wandering }))
                       .filter(p=> !isNaN(p.t) && !isNaN(p.mw))
                       .sort((a,b)=> a.t-b.t);
    const rec = { cond, def, isSound, nProbes: probes.length };
    if (!probes.length){ conds.push(rec); return; }
    rec.mwRate = probes.filter(p=>p.mw>0).length / probes.length;
    let events;
    if (isSound){
      events = rows.filter(r=> r.row_type==="trial" && r.condition===cond && r.ResponseType==="hit" && r.RT!=="" && r.RT!=null)
                   .map(r=>({ t:+r.stimOn_block, v:+r.RT }));
    } else {
      events = rows.filter(r=> r.row_type==="breath" && r.condition===cond && r.since_last_press!=="" && r.since_last_press!=null)
                   .map(r=>({ t:+r.press_block, v:+r.since_last_press }));
    }
    events = events.filter(e=> !isNaN(e.t) && !isNaN(e.v));
    rec.nEvents = events.length;
    const labelOf = (t)=>{ let p = probes.find(p=> p.t >= t); if (!p) p = probes[probes.length-1]; return p.mw>0 ? "off":"on"; };
    rec.on  = statOf(events.filter(e=> labelOf(e.t)==="on").map(e=>e.v));
    rec.off = statOf(events.filter(e=> labelOf(e.t)==="off").map(e=>e.v));
    rec.behTrend = halfTrend(events);
    rec.mwTrend  = halfTrend(probes.map(p=>({t:p.t, v: p.mw>0?1:0})));
    conds.push(rec);
  });
  return conds;
}
function onVsOffLine(rec){
  const on = rec.on, off = rec.off;
  if (rec.isSound){
    if (!on || !on.n || on.n<3) return "Not enough on-task targets to summarize reaction times.";
    let s = `On-task reactions averaged <strong>${Math.round(on.mean*1000)} ms</strong> (variability ${on.cv.toFixed(2)})`;
    if (off && off.n>=3) s += `; off-task <strong>${Math.round(off.mean*1000)} ms</strong> (${off.cv.toFixed(2)}).`;
    else s += `. Too few off-task moments to compare.`;
    return s;
  } else {
    if (!on || !on.n || on.n<3) return "Not enough on-task breaths to summarize timing.";
    let s = `On-task breaths came every <strong>${on.mean.toFixed(1)} s</strong> (variability ${on.cv.toFixed(2)})`;
    if (off && off.n>=3) s += `; off-task every <strong>${off.mean.toFixed(1)} s</strong> (${off.cv.toFixed(2)}).`;
    else s += `. Too few off-task moments to compare.`;
    return s;
  }
}
function trendLine(rec){
  const parts = [];
  if (rec.mwTrend){
    const d = rec.mwTrend.dir;
    parts.push(d==="up" ? "mind-wandering rose over the block" : d==="down" ? "mind-wandering eased over the block" : "mind-wandering held fairly steady");
  }
  if (rec.behTrend){
    const d = rec.behTrend.dir;
    if (rec.isSound) parts.push(d==="up" ? "reaction times slowed" : d==="down" ? "reaction times quickened" : "reaction times held steady");
    else parts.push(d==="up" ? "breaths lengthened" : d==="down" ? "breaths shortened" : "breath timing held steady");

function handleSoundPress(){
  const t = performance.now();

  if (!owner) return;
  const rt = (t - owner.onsetPerf)/1000;
  const press = {
    press: BLK.Button.length+1, context:"oddball_response",
    time:t, time_block:(t-BLK.blockStartPerf)/1000, RT:rt,
    preceding_trial:owner.trial, preceding_stimulus_name:owner.StimulusName,
    Correct:null, ResponseType:"",
  };
  if (owner.isTarget && owner.Report !== 1){ press.Correct = 1; press.ResponseType = "hit"; }
  else if (owner.isTarget && owner.Report === 1){ press.Correct = 0; press.ResponseType = "extra_target_press"; }
  else { press.Correct = 0; press.ResponseType = "false_alarm"; }
  BLK.Button.push(press);
  if (owner.Report !== 1){
    owner.Report = 1; owner.RT = rt;
    owner.RT_off = (t - (owner.onsetPerf + CONFIG.stimDurationSecs*1000))/1000;
    if (owner.isTarget){ owner.Correct = 1; owner.ResponseType = "hit"; }
    else { owner.Correct = 0; owner.ResponseType = "false_alarm"; }

}

  const t = m => Math.round(nC*(m+1)+3);
  if (CONFIG.OFFER_DURATION_CHOICE){
    const a = t(CONFIG.BLOCK_MINUTES_SHORT), b = t(CONFIG.BLOCK_MINUTES_IDEAL);
    return `${Math.min(a,b)}–${Math.max(a,b)} minutes`;
  }
  return `${t(RUN.blockMinutes)} minutes`;
}
/* ===================== BOOT ====================================== */
start();
</script>
